<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="850" viewBox="0 0 1500 850">
  <defs>
    <style>
      .bg{fill:#f7f9fb}.title{font:700 44px sans-serif;fill:#17202a}.h{font:700 25px sans-serif;fill:#102a43}
      .t{font:400 20px sans-serif;fill:#263238}.s{font:400 16px sans-serif;fill:#52616b}.box{fill:#fff;stroke:#b8c5d3;stroke-width:2;rx:16}
      .gate{fill:#e7f0ff;stroke:#4d7cfe}.pass{fill:#e8f7ef;stroke:#2f9e62}.stop{fill:#ffe8e8;stroke:#d64545}
      .arrow{stroke:#455a64;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#455a64"/></marker>
  </defs>
  <rect class="bg" width="1500" height="850"/>
  <text class="title" x="70" y="80">Phase 04: 誤検知削減の3ゲート</text>
  <text class="s" x="72" y="115">候補発見を機械的に確認し、重大な真陽性を落とさないことを重視</text>

  <rect class="box" x="70" y="280" width="230" height="120"/>
  <text class="h" x="105" y="330">Phase 03候補</text>
  <text class="s" x="105" y="365">vulnerability等</text>
  <path class="arrow" d="M310 340 H390"/>

  <rect class="box gate" x="400" y="245" width="250" height="190"/>
  <text class="h" x="435" y="295">Gate 1</text>
  <text class="t" x="435" y="335">Dead Code</text>
  <text class="s" x="435" y="370">非テスト呼び出し元がない</text>
  <text class="s" x="435" y="400">ならDISPUTED_FP</text>
  <path class="arrow" d="M660 340 H740"/>

  <rect class="box gate" x="750" y="245" width="250" height="190"/>
  <text class="h" x="785" y="295">Gate 2</text>
  <text class="t" x="785" y="335">Trust Boundary</text>
  <text class="s" x="785" y="370">攻撃データ源が信頼済みか</text>
  <text class="s" x="785" y="400">scope定義で確認</text>
  <path class="arrow" d="M1010 340 H1090"/>

  <rect class="box gate" x="1100" y="245" width="250" height="190"/>
  <text class="h" x="1135" y="295">Gate 3</text>
  <text class="t" x="1135" y="335">Scope Check</text>
  <text class="s" x="1135" y="370">out-of-scopeや制約に</text>
  <text class="s" x="1135" y="400">該当しないか確認</text>

  <path class="arrow" d="M1225 445 V555"/>
  <rect class="box pass" x="930" y="560" width="420" height="120"/>
  <text class="h" x="970" y="610">通過した候補</text>
  <text class="t" x="970" y="650">CONFIRMED / DOWNGRADED / MANUAL REVIEW</text>

  <rect class="box stop" x="170" y="560" width="570" height="120"/>
  <text class="h" x="210" y="610">どこかのゲートで止まる候補</text>
  <text class="t" x="210" y="650">DISPUTED_FP として誤検知扱い</text>
  <path class="arrow" d="M525 445 V550"/>
  <path class="arrow" d="M875 445 V505 H455 V550"/>
  <path class="arrow" d="M1225 445 V505 H455 V550"/>
</svg>
